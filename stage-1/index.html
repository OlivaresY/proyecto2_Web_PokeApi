<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Battle</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<main class="container">
    <div class="battle-layout">
        <section class="pokemon player">
            <div class="trainer-card">
                <h1>Entrenador</h1>
                <p id="trainer-name">Cargando...</p>
                <p id="trainer-town">Cargando...</p>
                <p id="trainer-phrase">Cargando...</p>
            </div>

            <h2>Tu Pokémon:</h2>
            <div class="pokemon-card dynamic-bg" id="player-card">
                <p class="loading">Cargando tu Pokémon...</p>
            </div>
        </section>

        <div class="vs"><span>VS</span></div>

        <section class="pokemon opponent">
            <div class="trainer-card">
                <h2>Oponente</h2>
                <p id="opponent-name">Esperando...</p>
                <p id="opponent-town">Esperando...</p>
                <p id="opponent-phrase">Esperando...</p>
            </div>

            <input type="text" id="search" placeholder="Buscar Pokémon..." />

            <div class="pokemon-card dynamic-bg" id="opponent-card">
                <p class="loading">Busca un Pokémon...</p>
            </div>
        </section>
    </div>

    <div class="battle-action">
        <button id="battle-btn" disabled>Ir a batalla</button>
    </div>
</main>

<script type="module" src="./main.js"></script>
</body>
</html>
